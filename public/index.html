<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreadVerse - Home</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="container header-container">
            <h1 class="logo"><a href="/">ThreadVerse</a></h1>
            <nav id="nav-links">
                <!-- Populated by JS -->
            </nav>
        </div>
    </header>

    <main class="container main-layout">
        <section class="feed">
            <h2>Recent Activity</h2>
            <div id="posts-container">
                <p class="loading">Discovering the verse...</p>
            </div>
        </section>

        <aside class="sidebar">
            <div class="sidebar-section">
                <h3>Discover Communities</h3>
                <ul id="communities-list">
                    <li class="loading">Loading...</li>
                </ul>
            </div>
            
            <div class="sidebar-section">
                <h3>About ThreadVerse</h3>
                <p style="font-size: 0.85rem; color: var(--text-secondary);">
                    A text-only, community-driven discussion platform built for speed and simplicity. No ads, no tracking, just conversations.
                </p>
            </div>
        </aside>
    </main>

    <script src="/js/utils.js"></script>
    <script src="/js/feed.js"></script>
</body>
</html>
