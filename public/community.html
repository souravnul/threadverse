<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreadVerse - Community</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .community-header {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .community-info h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .community-info p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
        }
        .community-actions {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            text-align: right;
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-container">
            <h1 class="logo"><a href="/">ThreadVerse</a></h1>
            <nav id="nav-links"></nav>
        </div>
    </header>

    <main class="container main-layout">
        <section class="feed">
            <div id="alert-container"></div>
            <div id="community-header-container">
                <p class="loading">Aligning the stars...</p>
            </div>

            <h2 style="margin: 2rem 0 1rem;">Community Feed</h2>
            <div id="posts-container">
                <p class="loading">Scanning for signals...</p>
            </div>
        </section>

        <aside class="sidebar">
            <div class="sidebar-section">
                <h3>Community Rules</h3>
                <ul style="font-size: 0.85rem; color: var(--text-secondary); padding-left: 1.25rem;">
                    <li>Be respectful</li>
                    <li>Text only, no media</li>
                    <li>No hate speech</li>
                </ul>
            </div>
        </aside>
    </main>

    <script src="/js/utils.js"></script>
    <script src="/js/community.js"></script>
</body>
</html>
